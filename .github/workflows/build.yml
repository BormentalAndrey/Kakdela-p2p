name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Сборка APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Fix resource file names
        run: |
          find app/src/main/res -type f -name "*.mp3.mp3" | while read f; do mv "$f" "${f%.mp3.mp3}.mp3" 2>/dev/null; echo "fixed: $f"; done
          find app/src/main/res -type f -name "*.png.png" | while read f; do mv "$f" "${f%.png.png}.png" 2>/dev/null; echo "fixed: $f"; done

      - name: Create round icons
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            if [ -f "app/src/main/res/mipmap-$dir/ic_launcher.png" ] && [ ! -f "app/src/main/res/mipmap-$dir/ic_launcher_round.png" ]; then
              cp "app/src/main/res/mipmap-$dir/ic_launcher.png" "app/src/main/res/mipmap-$dir/ic_launcher_round.png"
              echo "✅ Создана: mipmap-$dir/ic_launcher_round.png"
            fi
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
