name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Сборка Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Fix resource file names
        run: |
          find app/src/main/res -type f -name "*.mp3.mp3" | while read f; do mv "$f" "${f%.mp3.mp3}.mp3" 2>/dev/null; echo "fixed: $f"; done
          find app/src/main/res -type f -name "*.png.png" | while read f; do mv "$f" "${f%.png.png}.png" 2>/dev/null; echo "fixed: $f"; done

      - name: Create round icons
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            if [ -f "app/src/main/res/mipmap-$dir/ic_launcher.png" ] && [ ! -f "app/src/main/res/mipmap-$dir/ic_launcher_round.png" ]; then
              cp "app/src/main/res/mipmap-$dir/ic_launcher.png" "app/src/main/res/mipmap-$dir/ic_launcher_round.png"
              echo "✅ Создана: mipmap-$dir/ic_launcher_round.png"
            fi
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  build-release:
    name: Сборка Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Fix resource file names
        run: |
          find app/src/main/res -type f -name "*.mp3.mp3" | while read f; do mv "$f" "${f%.mp3.mp3}.mp3" 2>/dev/null; echo "fixed: $f"; done
          find app/src/main/res -type f -name "*.png.png" | while read f; do mv "$f" "${f%.png.png}.png" 2>/dev/null; echo "fixed: $f"; done

      - name: Create round icons
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            if [ -f "app/src/main/res/mipmap-$dir/ic_launcher.png" ] && [ ! -f "app/src/main/res/mipmap-$dir/ic_launcher_round.png" ]; then
              cp "app/src/main/res/mipmap-$dir/ic_launcher.png" "app/src/main/res/mipmap-$dir/ic_launcher_round.png"
              echo "✅ Создана: mipmap-$dir/ic_launcher_round.png"
            fi
          done

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html
